name: CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # tests/orchestrator/test_plugin_contract.py resolves a canonical example
    # from a sibling fwbg checkout (mirrors production, where FWBG_REPO_ROOT
    # always points at a checked-out fwbg tree - see docker-compose's
    # `.:/fwbg-src:ro` mount). actions/checkout refuses a `path` outside the
    # workspace root, so both repos are checked out *under* it instead and
    # every step below runs with fwbg-agents as its working directory -
    # net result is the same sibling layout local dev already has.
    defaults:
      run:
        working-directory: fwbg-agents

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          path: fwbg-agents

      - name: Checkout sibling fwbg repo (for plugin contract fixtures)
        uses: actions/checkout@v7
        with:
          repository: haexhub/fwbg
          path: fwbg
          token: ${{ secrets.RELEASE_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy src

      - name: Run Tests
        run: uv run pytest

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
