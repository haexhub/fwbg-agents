# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    ignore:
      # pydantic-ai is pinned <3 in pyproject; a major must be a deliberate
      # migration PR (touches tools/llm.py usage extraction), never automerged.
      - dependency-name: "pydantic-ai"
        update-types: ["version-update:semver-major"]
    groups:
      data:
        patterns:
          - "numpy"
          - "pandas"
          - "pyarrow"
        update-types: ["minor", "patch"]
      web:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
          - "sse-starlette"
          - "httpx"
        update-types: ["minor", "patch"]
      db:
        patterns:
          - "sqlalchemy"
          - "aiosqlite"
          - "alembic"
        update-types: ["minor", "patch"]
      dev-tools:
        patterns:
          - "ruff"
          - "pytest*"
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "docker"
    ignore:
      # Runtime stage's python must match the builder stage's minor
      # (3.12, hardcoded in the builder FROM line) or the venv at
      # .venv/lib/python3.12/site-packages can't be imported. A minor bump
      # here needs a manual Dockerfile change in both stages, never automerged.
      - dependency-name: "python"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
