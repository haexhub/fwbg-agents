# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
    groups:
      data:
        patterns:
          - "numpy"
          - "pandas"
          - "pyarrow"
        update-types: ["minor", "patch"]
      web:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
          - "sse-starlette"
          - "httpx"
        update-types: ["minor", "patch"]
      db:
        patterns:
          - "sqlalchemy"
          - "aiosqlite"
          - "alembic"
        update-types: ["minor", "patch"]
      dev-tools:
        patterns:
          - "ruff"
          - "pytest*"
        update-types: ["minor", "patch"]

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Berlin"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
